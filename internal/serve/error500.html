<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>500 - System Error | Safe Zone</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070c;
      --surface: #0b1320;
      --surface-2: #101b2b;
      --ink: #f4f7fb;
      --text: #d8e2ef;
      --muted: #8fa0b8;
      --line: rgba(154, 190, 231, 0.14);
      --bad: #ff5f86;
      --bad-soft: rgba(255, 95, 134, 0.14);
      --accent: #78c7ff;
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background:
        linear-gradient(rgba(154, 190, 231, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(154, 190, 231, 0.022) 1px, transparent 1px),
        linear-gradient(135deg, var(--bg), #07101b 52%, #081321);
      background-size: 64px 64px, 64px 64px, auto;
    }

    main {
      width: min(620px, 100%);
      display: grid;
      gap: 18px;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.012)), var(--surface);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.045);
    }

    .mark {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 95, 134, 0.34);
      border-radius: var(--radius);
      color: var(--bad);
      background: var(--bad-soft);
      font-weight: 800;
    }

    h1 {
      margin: 0;
      color: var(--ink);
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .badge,
    .reference {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border: 1px solid rgba(255, 95, 134, 0.34);
      border-radius: 999px;
      color: #ffc3cf;
      background: var(--bad-soft);
      font: 700 0.72rem/1 ui-monospace, SFMono-Regular, Consolas, monospace;
      text-transform: uppercase;
    }

    .reference {
      width: 100%;
      justify-content: space-between;
      gap: 12px;
      min-height: 46px;
      border-color: var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: var(--surface-2);
      text-transform: none;
      overflow-wrap: anywhere;
    }

    .reference span {
      color: var(--muted);
    }

    a {
      display: inline-flex;
      width: fit-content;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border: 1px solid rgba(120, 199, 255, 0.42);
      border-radius: var(--radius);
      color: var(--ink);
      background: rgba(120, 199, 255, 0.12);
      text-decoration: none;
      font-weight: 700;
    }

    a:hover {
      border-color: rgba(120, 199, 255, 0.72);
      background: rgba(120, 199, 255, 0.18);
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">500</div>
    <span class="badge">Internal Server Error</span>
    <h1>Safe Zone hit a runtime error.</h1>
    <p>The request could not be completed. The incident was logged with a request reference so operators can inspect the server trace without exposing internal details here.</p>
    <div class="reference"><span>Request ID</span><strong>{{REQUEST_ID}}</strong></div>
    <a href="/dashboard">Back to Dashboard</a>
  </main>
</body>
</html>
