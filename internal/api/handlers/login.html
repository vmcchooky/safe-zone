<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel Command OS Login</title>
  <link rel="stylesheet" href="/assets/quorix.min.css">
  <link rel="stylesheet" href="/assets/safe-zone.css">
</head>
<body class="sentinel-access-page" oncontextmenu="return false;">
  <main class="access-portal" id="loginCard">
    <section class="access-brand-pane">
      <div class="access-brand-mark stellar-pulse">SZ</div>
      <h1 class="access-brand-title">Sentinel Command OS</h1>
      <p class="access-brand-subtitle">Local-first anti-phishing control plane</p>
    </section>

    <section class="access-form-pane">
      <div id="inlineError" class="access-error" aria-live="assertive"></div>
      
      <form id="adminLoginForm" class="access-form">
        <div class="form-group">
          <label for="username">Identity</label>
          <input type="text" id="username" value="admin" required autocomplete="off" placeholder="admin or guest">
        </div>

        <div class="form-group">
          <label for="password">Access token</label>
          <input type="password" id="password" required placeholder="Enter token" autofocus>
        </div>

        <button type="submit" id="submitBtn" class="access-submit">
          <span id="btnText">Establish connection</span>
          <span id="btnIcon" aria-hidden="true">-&gt;</span>
        </button>
      </form>

      <p class="access-footer-note">Use <strong>admin</strong> for full control or <strong>guest</strong> for read-only review. Verified by core API.</p>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const form = document.getElementById('adminLoginForm');
    const btn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const inlineError = document.getElementById('inlineError');
    const toast = document.getElementById('toast');
    let toastTimer;

    const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    const motionOK = () => !motionQuery.matches;

    function pulseNode(el, className) {
      if (!el || !motionOK()) return;
      el.classList.remove(className);
      void el.offsetWidth;
      el.classList.add(className);
    }

    function showToast(msg) {
      inlineError.textContent = msg;
      inlineError.classList.add('show');
      if (motionOK()) inlineError.classList.add('comet-in');
      
      // Also show toast as a fallback
      toast.textContent = msg;
      toast.className = 'toast err show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { 
        toast.classList.remove('show'); 
        if (motionOK()) toast.classList.add('is-closing');
        setTimeout(() => toast.classList.remove('is-closing'), 190);
      }, 3000);
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      btn.disabled = true;
      inlineError.classList.remove('show', 'comet-in');
      
      btnText.textContent = 'Verifying...';
      if (motionOK()) pulseNode(btnText, 'star-glint');
      btnIcon.textContent = '';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Authentication failed');
        }

        btnText.textContent = 'Access granted';
        btnIcon.textContent = 'OK';
        if (motionOK()) pulseNode(btnText, 'star-glint');
        setTimeout(() => {
          window.location.reload();
        }, 500);
      } catch (err) {
        showToast(err.message);
        btn.disabled = false;
        btnText.textContent = 'Establish connection';
        btnIcon.textContent = '->';
      }
    });
  </script>
</body>
</html>
