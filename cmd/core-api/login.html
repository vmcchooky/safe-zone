<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel Command OS Login</title>
  <link rel="stylesheet" href="/assets/quorix.min.css">
  <link rel="stylesheet" href="/assets/safe-zone.css">
</head>
<body class="login-page" oncontextmenu="return false;">
  <main class="login-wrapper">
    <section class="login-card-pro" id="loginCard">
      <header class="brand-header-pro">
        <div class="logo-icon-pro">SZ</div>
        <h1 class="brand-title-pro">Sentinel Command OS</h1>
        <p class="brand-subtitle-pro">Admin gateway</p>
      </header>

      <form id="adminLoginForm">
        <div class="form-group-pro">
          <label for="username">Admin identity</label>
          <input type="text" id="username" value="admin" required autocomplete="off" placeholder="root_admin">
        </div>

        <div class="form-group-pro">
          <label for="password">Access token</label>
          <input type="password" id="password" required placeholder="Enter token" autofocus>
        </div>

        <button type="submit" id="submitBtn" class="login-btn-pro">
          <span id="btnText">Establish connection</span>
          <span id="btnIcon" aria-hidden="true">-&gt;</span>
        </button>
      </form>

      <p class="footer-note-pro">Local session only. Credentials are verified by the core API.</p>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const form = document.getElementById('adminLoginForm');
    const btn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const toast = document.getElementById('toast');
    let toastTimer;

    function showToast(msg) {
      toast.textContent = msg;
      toast.className = 'toast err show';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 3000);
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      btn.disabled = true;
      btnText.textContent = 'Verifying credentials...';
      btnIcon.textContent = '';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Authentication failed');
        }

        btnText.textContent = 'Access granted';
        btnIcon.textContent = 'OK';
        setTimeout(() => {
          window.location.reload();
        }, 500);
      } catch (err) {
        showToast(err.message);
        btn.disabled = false;
        btnText.textContent = 'Establish connection';
        btnIcon.textContent = '->';
      }
    });
  </script>
</body>
</html>
