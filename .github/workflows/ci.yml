name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-metadata:
    name: Build metadata
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.meta.outputs.build_time }}
    steps:
      - name: Generate timestamp
        id: meta
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  test-security:
    name: Test and security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Run gosec
        run: go run github.com/securego/gosec/v2/cmd/gosec@latest ./...

      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  docker-build:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - test-security
      - build-metadata
    strategy:
      fail-fast: false
      matrix:
        service:
          - core-api
          - dns-resolver
          - feed-sync
          - feed-syncd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: >
          docker build
          --build-arg SERVICE=${{ matrix.service }}
          --build-arg VERSION=ci
          --build-arg GIT_COMMIT=${{ github.sha }}
          --build-arg BUILD_TIME=${{ needs.build-metadata.outputs.build_time }}
          --build-arg IMAGE_TAG=safe-zone-${{ matrix.service }}:${{ github.sha }}
          --build-arg SOURCE_REPO=${{ github.server_url }}/${{ github.repository }}
          -t safe-zone-${{ matrix.service }}:${{ github.sha }}
          .
