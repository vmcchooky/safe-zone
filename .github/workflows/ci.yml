name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-metadata:
    name: Build metadata
    runs-on: ubuntu-latest
    outputs:
      build_time: ${{ steps.meta.outputs.build_time }}
    steps:
      - name: Generate timestamp
        id: meta
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

  quality:
    name: Repository quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          cache: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI dependencies and Playwright Chromium
        run: |
          npm ci --prefix ui
          npm --prefix ui exec -- playwright install --with-deps chromium

      - name: Run CI task graph
        run: mise run ci

  docker-build:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs:
      - quality
      - build-metadata
    strategy:
      fail-fast: false
      matrix:
        service:
          - core-api
          - dns-resolver
          - feed-sync
          - feed-syncd
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: >
          docker build
          --build-arg SERVICE=${{ matrix.service }}
          --build-arg VERSION=ci
          --build-arg GIT_COMMIT=${{ github.sha }}
          --build-arg BUILD_TIME=${{ needs.build-metadata.outputs.build_time }}
          --build-arg IMAGE_TAG=safe-zone-${{ matrix.service }}:${{ github.sha }}
          --build-arg SOURCE_REPO=${{ github.server_url }}/${{ github.repository }}
          -t safe-zone-${{ matrix.service }}:${{ github.sha }}
          .
