<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%">
  <!-- Definition of gradients -->
  <defs>
    <!-- Background Gradient (almost white to very light gray/slate) -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    
    <!-- Soft Gray Glows -->
    <radialGradient id="glow-1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#f1f5f9" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base background fill -->
  <rect width="1440" height="900" fill="url(#bg-grad)" />

  <!-- Ambient light-gray glow elements -->
  <rect width="1440" height="900" fill="url(#glow-1)" />
  <rect width="1440" height="900" fill="url(#glow-2)" />

  <!-- Extremely minimalist, thin flowing lines (white, gray, slate with high transparency) -->
  <!-- Top Right wave -->
  <path d="M900 0 C 1100 200, 1200 150, 1440 250 L 1440 0 Z" fill="#ffffff" fill-opacity="0.4" />
  <path d="M850 0 C 1050 250, 1180 180, 1440 320" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-opacity="0.5" />
  <path d="M950 0 C 1120 180, 1250 120, 1440 200" fill="none" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.3" />

  <!-- Bottom Left wave -->
  <path d="M0 650 C 200 750, 350 700, 600 900 L 0 900 Z" fill="#f8fafc" fill-opacity="0.6" />
  <path d="M0 600 C 250 780, 380 730, 650 900" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-opacity="0.4" />
  <path d="M0 700 C 180 800, 300 780, 520 900" fill="none" stroke="#64748b" stroke-width="1" stroke-opacity="0.15" />

  <!-- A single subtle dark gray accent curve slicing through the middle -->
  <path d="M150 150 C 450 350, 950 250, 1250 750" fill="none" stroke="#334155" stroke-width="1.2" stroke-opacity="0.08" stroke-dasharray="8 6" />
  
  <!-- Subtle dark gray dots or crosshair accents for technical aesthetic -->
  <circle cx="150" cy="150" r="3" fill="#0f172a" fill-opacity="0.1" />
  <line x1="140" y1="150" x2="160" y2="150" stroke="#0f172a" stroke-width="0.7" stroke-opacity="0.1" />
  <line x1="150" y1="140" x2="150" y2="160" stroke="#0f172a" stroke-width="0.7" stroke-opacity="0.1" />

  <circle cx="1250" cy="750" r="3" fill="#0f172a" fill-opacity="0.1" />
  <line x1="1240" y1="750" x2="1260" y2="750" stroke="#0f172a" stroke-width="0.7" stroke-opacity="0.1" />
  <line x1="1250" y1="740" x2="1250" y2="760" stroke="#0f172a" stroke-width="0.7" stroke-opacity="0.1" />
</svg>
