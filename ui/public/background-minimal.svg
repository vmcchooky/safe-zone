<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%">
  <defs>
    <!-- Master white-to-slate background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>

    <!-- Gradient 1: Soft White to Light Gray -->
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#f8fafc" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Gradient 2: Charcoal to Transparent Gray -->
    <linearGradient id="wave2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#334155" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#cbd5e1" stop-opacity="0.12"/>
    </linearGradient>

    <!-- Gradient 3: Soft Gray to White -->
    <linearGradient id="wave3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.7"/>
      <stop offset="70%" stop-color="#f8fafc" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f1f5f9" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Ambient Shadow Filter for organic depth -->
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#0f172a" flood-opacity="0.03" />
    </filter>
  </defs>

  <!-- Base canvas -->
  <rect width="1440" height="900" fill="url(#bg)" />

  <!-- Flowing abstract colored bands -->
  <!-- Band 1: Huge sweeping wave at the top-middle -->
  <path d="M-100 220 C 300 420, 700 120, 1100 370 C 1300 470, 1500 320, 1600 370 L 1600 0 L -100 0 Z" fill="url(#wave1)" filter="url(#soft-shadow)" />

  <!-- Band 2: Interweaving dark gray/charcoal wave from bottom-left to top-right -->
  <path d="M-100 520 C 250 320, 650 620, 1000 320 C 1250 120, 1450 220, 1600 170 L 1600 900 L -100 900 Z" fill="url(#wave2)" />

  <!-- Band 3: Elegant white/light-gray overlapping fluid ribbon -->
  <path d="M-100 720 C 350 520, 500 820, 950 570 C 1200 440, 1400 620, 1600 520 L 1600 900 L -100 900 Z" fill="url(#wave3)" filter="url(#soft-shadow)" />

  <!-- Band 4: A subtle thin, highlighted abstract edge ribbon -->
  <path d="M-100 700 C 350 500, 500 800, 950 550 C 1200 420, 1400 600, 1600 500" fill="none" stroke="#f8fafc" stroke-width="3.5" stroke-opacity="0.6" />
  
  <!-- Subtle minimalist black line accentuating the flow -->
  <path d="M-100 535 C 250 335, 650 635, 1000 335 C 1250 135, 1450 235, 1600 185" fill="none" stroke="#0f172a" stroke-width="1.2" stroke-opacity="0.05" />
</svg>
