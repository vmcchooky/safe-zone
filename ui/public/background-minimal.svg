<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%">
  <defs>
    <!-- Base Background: Sophisticated cool slate gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>

    <!-- Dark Charcoal Ribbon Gradient (Darker for contrast) -->
    <linearGradient id="charcoal-wave" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.16"/>
      <stop offset="50%" stop-color="#1e293b" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#475569" stop-opacity="0.18"/>
    </linearGradient>

    <!-- Medium Slate Ribbon Gradient -->
    <linearGradient id="slate-wave" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#64748b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0.14"/>
    </linearGradient>

    <!-- Crisp White Silk Ribbon Gradient -->
    <linearGradient id="white-wave" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#f8fafc" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Dark Ambient Glow -->
    <radialGradient id="dark-glow" cx="90%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- High-end Drop Shadow for overlap depth -->
    <filter id="premium-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#0f172a" flood-opacity="0.06" />
    </filter>
  </defs>

  <!-- Canvas Background -->
  <rect width="1440" height="900" fill="url(#bg)" />
  <rect width="1440" height="900" fill="url(#dark-glow)" />

  <!-- Fluid Ribbon 1: Heavier Dark Charcoal Wave (Sweeps from top-left, dips deep in middle, exits right) -->
  <path d="M-100 150 C 350 450, 750 50, 1150 400 C 1350 520, 1500 350, 1600 400 L 1600 0 L -100 0 Z" fill="url(#charcoal-wave)" filter="url(#premium-shadow)" />

  <!-- Fluid Ribbon 2: Medium Slate Ribbon (Flows below the charcoal one, interweaving) -->
  <path d="M-100 480 C 200 280, 600 580, 950 280 C 1200 80, 1400 180, 1600 130 L 1600 900 L -100 900 Z" fill="url(#slate-wave)" />

  <!-- Fluid Ribbon 3: Pure White Crisp Silk Wave (Dominant overlay at the bottom) -->
  <path d="M-100 680 C 350 480, 480 780, 900 530 C 1150 380, 1350 580, 1600 480 L 1600 900 L -100 900 Z" fill="url(#white-wave)" filter="url(#premium-shadow)" />

  <!-- Accent Highlight Line: Glossy white edge on the white ribbon -->
  <path d="M-100 660 C 350 460, 480 760, 900 510 C 1150 360, 1350 560, 1600 460" fill="none" stroke="#ffffff" stroke-width="4" stroke-opacity="0.75" />

  <!-- Accent Shadow Line: Thin dark charcoal stroke tracing the flow for high technical precision -->
  <path d="M-100 495 C 200 295, 600 595, 950 295 C 1200 95, 1400 195, 1600 145" fill="none" stroke="#0f172a" stroke-width="1.5" stroke-opacity="0.12" />

  <!-- Additional very thin dark slate accent line for sophisticated layering -->
  <path d="M-100 165 C 350 465, 750 65, 1150 415" fill="none" stroke="#1e293b" stroke-width="1" stroke-opacity="0.15" />
</svg>
