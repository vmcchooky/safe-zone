<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Soft background gradient -->
    <linearGradient id="gradBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#fdfdfd" />
      <stop offset="100%" stop-color="#f4f4f5" />
    </linearGradient>

    <!-- Very light pink gradient -->
    <linearGradient id="gradPink" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbcfe8" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#fce7f3" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Very light gray/blue gradient -->
    <linearGradient id="gradGray" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#e5e7eb" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="100%" height="100%" fill="url(#gradBase)" />

  <!-- Flowing Shapes -->
  <!-- Bottom left sweeping curve (Pink) -->
  <path d="M0,900 L0,500 C300,600 500,800 800,700 C1100,600 1300,900 1440,850 L1440,900 Z" fill="url(#gradPink)" />

  <!-- Top right sweeping curve (Gray) -->
  <path d="M1440,0 L1440,400 C1100,200 900,400 600,300 C300,200 100,0 0,50 L0,0 Z" fill="url(#gradGray)" />

  <!-- Middle subtle wave (Pinkish white) -->
  <path d="M-200,300 C200,600 600,100 1000,500 C1400,900 1600,500 1600,500 L1600,1100 L-200,1100 Z" fill="url(#gradPink)" opacity="0.4" />

  <!-- Layered bottom curve (Light gray) -->
  <path d="M0,900 L0,700 C400,750 600,900 1000,800 C1200,750 1440,900 1440,900 Z" fill="#e5e7eb" opacity="0.4" />
</svg>
